name: poll-news

on:
  schedule:
    - cron: "*/5 * * * *"   # GitHub may delay scheduled runs 5-15 min under load
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bot-state          # never run two state-writing jobs at once
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run pipeline
        env:
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m newsbot.main
      - name: Commit state
        run: |
          git config user.name "market-mover-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data
          if ! git diff --cached --quiet; then
            git commit -m "state: $(date -u +%FT%TZ)"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
