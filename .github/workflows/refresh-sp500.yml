name: refresh-sp500

on:
  schedule:
    - cron: "0 8 * * 0"  # Sundays 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bot-state
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python scripts/refresh_sp500.py
      - name: Commit list
        run: |
          git config user.name "market-mover-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/sp500.csv
          if ! git diff --cached --quiet; then
            git commit -m "refresh S&P 500 constituents"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
